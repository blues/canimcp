name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Type check
        run: npx astro check --minimumSeverity error
      - name: Unit tests
        run: npm test
      - name: Validate data + build matrix.json
        run: npx tsx scripts/build-data.ts
      - name: Astro build
        run: npm run build
